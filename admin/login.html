<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Admin Login – VEXROA</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script defer src="../assets/js/admin.js"></script>
  </head>
  <body class="login-wrapper admin-body" data-page="admin-login">

  <!-- Brand -->
  <div class="login-top">
    <img src="../assets/images/logo.png" class="brand-logo" alt="VEXROA" />
    <h1 class="brand-name">VEXROA Admin</h1>
    <p class="brand-tagline">Digital Creator Studio</p>
  </div>

  <!-- Login Card -->
  <div class="login-container">
    <form id="loginForm">
      <h2 class="login-heading">Sign In</h2>

      <label>Email</label>
      <input type="email" id="adminEmail" placeholder="admin@vexroa.in" required />

      <label>Password</label>
      <input type="password" id="adminPassword" placeholder="Enter password" required />

      <button type="submit" class="login-button">Login</button>
    </form>
    <p id="loginStatus" class="login-msg"></p>
  </div>

</body>

</html>
